# ================================================================

# ================================================================
#  PALETTE
# ================================================================
$c_selected   = rgb(d5e86d)   # signal yellow-green
$c_text       = rgb(bdbfad)   # warm fog
$c_base       = rgb(070703)   # void black
$c_border     = rgb(909060)   # olive drab
$c_border2    = rgb(4a4a30)   # deep olive (inactive)
$c_urgent     = rgb(ea6962)   # red alert
$c_dim        = rgb(1a1a10)   # near-black with warmth

# ================================================================
#  GENERAL
# ================================================================
general {
    gaps_in                  = 5
    gaps_out                 = 14
    border_size              = 3

    col.active_border        = $c_selected $c_border 45deg
    col.inactive_border      = $c_border2

    resize_on_border         = true
    extend_border_grab_area  = 8
    hover_icon_on_border     = true
}

# ================================================================
#  DECORATION
# ================================================================
decoration {
    rounding                 = 0

    active_opacity           = 1.0
    inactive_opacity         = 0.95
    fullscreen_opacity       = 1.0

    dim_inactive             = false
    dim_strength             = 0.10
    dim_special              = 0.35

    blur {
        enabled              = true
        size                 = 3
        passes               = 3
        noise                = 0.25
        contrast             = 0.95
        brightness           = 0.85
        vibrancy             = 0.12
        vibrancy_darkness    = 0.3
        special              = true
        popups               = true
    }

    shadow {
        enabled              = true
        range                = 28
        render_power         = 3
        color                = rgba(d5e86d18)
        color_inactive       = rgba(00000055)
        offset               = 0 4
        scale                = 0.98
    }
}

# ================================================================
#  ANIMATIONS ‚ÄĒ decode / signal-lock feel
# ================================================================
animations {
    enabled = true

    bezier = snappy,     0.25, 1.0,  0.5,  1.0
    bezier = overshot,   0.20, 1.30, 0.40, 1.00
    bezier = linear,     0.0,  0.0,  1.0,  1.0
    bezier = decelerate, 0.05, 0.9,  0.1,  1.0
    bezier = glitch,     0.68,-0.55, 0.27, 1.55

    animation = windowsIn,    1, 4,  overshot,   slide
    animation = windowsOut,   1, 3,  decelerate, popin 85%
    animation = windowsMove,  1, 4,  snappy

    animation = border,       1, 6,  linear
    animation = borderangle,  1, 80, linear,     loop

    animation = fadeIn,       1, 4,  decelerate
    animation = fadeOut,      1, 3,  decelerate
    animation = fadeSwitch,   1, 5,  decelerate
    animation = fadeShadow,   1, 5,  decelerate
    animation = fadeDim,      1, 5,  decelerate
    animation = fadeLayersIn,  1, 4, decelerate
    animation = fadeLayersOut, 1, 3, decelerate

    animation = workspaces,       1, 5, snappy,    slidevert
    animation = specialWorkspace, 1, 4, decelerate, slidevert
}

# ================================================================
#  GROUP
# ================================================================
group {
    col.border_active          = $c_selected $c_border 45deg
    col.border_inactive        = $c_border2
    col.border_locked_active   = $c_urgent
    col.border_locked_inactive = rgba(4a4a3088)

    groupbar {
        enabled          = true
        font_size        = 10
        height           = 18
        gradients        = true
        render_titles    = true
        scrolling        = true

        col.active          = $c_selected
        col.inactive        = $c_border2
        col.locked_active   = $c_urgent
        col.locked_inactive = rgba(4a4a3088)

        text_color       = $c_base
    }
}
